esphome:
  name: test-fp2

esp32:
  board: esp32-solo1
  framework:
    type: esp-idf

    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: "y"
      CONFIG_ESP_SYSTEM_SINGLE_CORE_MODE: "y"
    advanced:
      ignore_efuse_mac_crc: true
      ignore_efuse_custom_mac: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Fp2 Fallback Hotspot"
    password: !secret fallback_hotspot_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

  actions:
    - action: get_map_config
      supports_response: only
      then:
        - api.respond:
            data: !lambda |-
              id(fp2).json_get_map_data(root);
    - action: fp2_force_detection_config
      then:
        - lambda: |-
            id(fp2).force_detection_config();
    - action: fp2_read_detection_config
      then:
        - lambda: |-
            id(fp2).read_detection_config();
    - action: fp2_read_mode_calibration_config
      then:
        - lambda: |-
            id(fp2).read_mode_calibration_config();
    - action: fp2_read_attr
      variables:
        attr: int
      then:
        - lambda: |-
            id(fp2).read_attr((uint16_t) attr);
    - action: fp2_write_attr_uint8
      variables:
        attr: int
        value: int
      then:
        - lambda: |-
            id(fp2).write_attr_uint8((uint16_t) attr, (uint8_t) value);
    - action: fp2_write_attr_uint16
      variables:
        attr: int
        value: int
      then:
        - lambda: |-
            id(fp2).write_attr_uint16((uint16_t) attr, (uint16_t) value);
    - action: fp2_write_attr_uint32
      variables:
        attr: int
        value: int
      then:
        - lambda: |-
            id(fp2).write_attr_uint32((uint16_t) attr, (uint32_t) value);
    - action: fp2_write_attr_bool
      variables:
        attr: int
        value: bool
      then:
        - lambda: |-
            id(fp2).write_attr_bool((uint16_t) attr, value);
    - action: fp2_configure_sleep_mode
      variables:
        width: int
        length: int
        mount_position: int
      then:
        - lambda: |-
            id(fp2).configure_sleep_mode((uint16_t) width, (uint16_t) length, (uint8_t) mount_position);
    - action: fp2_set_work_mode
      variables:
        mode: int
      then:
        - lambda: |-
            id(fp2).set_work_mode((uint8_t) mode);
    - action: fp2_set_ai_target_filter
      variables:
        enabled: bool
      then:
        - lambda: |-
            id(fp2).set_ai_target_filter_enabled(enabled);
    - action: fp2_calibrate_empty_room
      then:
        - lambda: |-
            id(fp2).calibrate_empty_room();
    - action: fp2_reset_radar
      then:
        - lambda: |-
            id(fp2).reset_radar();

button:
  - platform: template
    name: "FP2 Force Detection Config"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fp2).force_detection_config();

  - platform: template
    name: "FP2 Calibrate Empty Room"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fp2).calibrate_empty_room();

  - platform: template
    name: "FP2 Reset Radar"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fp2).reset_radar();

  # Let the radar auto-learn room edges / interference sources (0x0150 / 0x0139)
  # instead of drawing the grids by hand.
  - platform: template
    name: "FP2 Auto Edge Detection"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fp2).set_edge_auto_enabled(true);
  - platform: template
    name: "FP2 Auto Interference Detection"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(fp2).set_interference_auto_enabled(true);

ota:
  - platform: esphome
    password: !secret ota_password

logger:

uart:
  id: uart_bus
  tx_pin: GPIO19
  rx_pin: GPIO18
  baud_rate: 890000

i2c:
  sda: GPIO33
  scl: GPIO32
  scan: true
  frequency: 100kHz

external_components:
  - source:
      type: local
      path: components
  # Switch to this source to build from outside the repo
  # - source: github://hansihe/esphome_fp2@main
  #   refresh: 120s
  #   components: [ aqara_fp2, aqara_fp2_accel ]

aqara_fp2_accel:
  id: fp2_accel

aqara_fp2:
  id: fp2
  accel: fp2_accel

  uart_id: uart_bus

  radar_reset_pin: GPIO13
  mounting_position: left_corner
  left_right_reverse: false

  # Firmware-derived radar report controls.
  # These mirror stock firmware SubIDs 0x0156-0x0174.
  people_counting_report_enable: true
  people_number_enable: true
  target_type_enable: false
  dwell_time_enable: false
  walking_distance_enable: false
  thermodynamic_chart_enable: true
  # Optional feature streams. Enable only when you want to experiment with them.
  # sleep_report_enable: true
  # posture_report_enable: true
  # fall_detection: false
  # fall_detection_sensitivity: medium
  # Surfaces the corrected 0x0121 fall-event report (0=clear/1=type A/2=type B)
  # as a binary_sensor. Requires WORK_MODE=8 (Fall Detection) to fire — see
  # the fp2_set_work_mode diagnostic action. Optional; not tied to the
  # fall_detection flag above.
  # fall_detected:
  #   name: "Fall Detected"

  target_tracking:
    name: "Targets"

  location_report_switch:
    name: "Report Targets"

  # PROTO-04 (D-04): switches the radar between its three factory-preinstalled
  # firmware images via plain WORK_MODE writes only - no OTA, no firmware
  # flashing. Options: "Zone Detection" (WORK_MODE=3, default), "Fall
  # Detection" (WORK_MODE=8, required for the fall_detected sensor above to
  # ever report), "Sleep Monitoring" (WORK_MODE=9, via configure_sleep_mode()
  # sequencing). Non-persistent this phase - always boots into Zone Detection.
  # operating_mode:
  #   name: "Operating Mode"

  # 14x14 Grid (Active Area)
  interference_grid: |-
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .

  exit_grid: |-
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .

  global_zone:
    presence_sensitivity: medium
    presence:
      name: "Global Presence"
    motion:
      name: "Global Motion"

  zones:
    - id: sofa_zone
      grid: |-
        . . X X X . . . . . . . . .
        . . X X X . . . . . . . . .
        . . X X X . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
      presence_sensitivity: high
      # Zone motion (0x0115) reports momentary events; the sensor is held ON and
      # released after this debounce timeout with no new movement (default 5s).
      motion_timeout: 5s
      # Optional furniture/scene type (0x0152) to cut false positives.
      # One of: tv, green_plant, leisure, dressing, closet, desk, shower, stairs.
      zone_type: leisure
      presence:
        name: "Sofa Zone Presence"
      motion:
        name: "Sofa Zone Motion"
      # Per-zone people count, decoded from ZONE_PEOPLE_NUMBER (0x0175). NOT the
      # same as the top-level `people_counting` sensor (0x0155) below -- this
      # one is scoped per zone. Requires an explicit block to appear in HA.
      # people_count:
      #   name: "Sofa Zone People Count"

  radar_software_version:
    name: "Radar Software Version"
  radar_temperature:
    name: "Radar Temperature"
  radar_debug:
    name: "Radar Debug"
  realtime_people_number:
    name: "Realtime People Number"
  ontime_people_number:
    name: "Ontime People Number"
  realtime_people_counting:
    name: "Realtime People Counting"
  people_counting:
    name: "People Counting"
  walking_distance:
    name: "Walking Distance"
  # Derived from the location tracking stream (0x0117).
  target_count:
    name: "Target Count"
  nearest_distance:
    name: "Nearest Target Distance"
  sleep_data:
    name: "Sleep Data"
  sleep_presence:
    name: "Sleep Presence"
  sleep_inout_state:
    name: "Sleep In Out State"
  sleep_state:
    name: "Sleep State"
  sleep_event:
    name: "Sleep Event"
  target_posture:
    name: "Target Posture"

sensor:
  - platform: opt3001
    name: "Illuminance"
    address: 0x44
    update_interval: 30s

binary_sensor:
  # Button on the bottom of the device
  - platform: gpio
    pin:
      number: GPIO36
      inverted: true
    name: "Device Button"

output:
  - platform: ledc
    id: status_led_red
    pin: GPIO14
    inverted: true
  - platform: ledc
    id: status_led_green
    pin: GPIO26
    inverted: true
  - platform: ledc
    id: status_led_blue
    pin: GPIO27
    inverted: true

light:
  - platform: rgb
    name: "Status LED"
    red: status_led_red
    green: status_led_green
    blue: status_led_blue
