esphome:
  name: test-fp2

esp32:
  board: esp32-solo1
  framework:
    type: esp-idf

    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: "y"
      CONFIG_ESP_SYSTEM_SINGLE_CORE_MODE: "y"
    advanced:
      ignore_efuse_mac_crc: true
      ignore_efuse_custom_mac: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Fp2 Fallback Hotspot"
    password: !secret fallback_hotspot_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

  actions:
    - action: get_map_config
      supports_response: only
      then:
        - api.respond:
            data: !lambda |-
              id(fp2).json_get_map_data(root);

ota:
  - platform: esphome
    password: !secret ota_password

logger:

uart:
  id: uart_bus
  tx_pin: GPIO19
  rx_pin: GPIO18
  baud_rate: 890000

external_components:
  - source:
      type: local
      path: components
  # Switch to this source to build from outside the repo
  # - source: github://hansihe/esphome_fp2@main
  #   refresh: 120s
  #   components: [ aqara_fp2, aqara_fp2_accel ]

aqara_fp2_accel:
  id: fp2_accel

aqara_fp2:
  id: fp2
  accel: fp2_accel

  uart_id: uart_bus

  radar_reset_pin: GPIO13
  mounting_position: left_corner
  left_right_reverse: false

  # Firmware-derived radar report controls.
  # These mirror stock firmware SubIDs 0x0156-0x0174.
  people_counting_report_enable: true
  people_number_enable: true
  target_type_enable: true
  dwell_time_enable: false
  walking_distance_enable: false
  thermodynamic_chart_enable: true
  # Optional feature streams. Enable only when you want to experiment with them.
  # sleep_report_enable: true
  # posture_report_enable: true
  # fall_detection: false
  # fall_detection_sensitivity: medium

  target_tracking:
    name: "Targets"

  location_report_switch:
    name: "Report Targets"

  # 14x14 Grid (Active Area)
  interference_grid: |-
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .

  exit_grid: |-
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .
    . . . . . . . . . . . . . .

  global_zone:
    presence_sensitivity: medium
    presence:
      name: "Global Presence"
    motion:
      name: "Global Motion"

  zones:
    - id: sofa_zone
      grid: |-
        . . X X X . . . . . . . . .
        . . X X X . . . . . . . . .
        . . X X X . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
        . . . . . . . . . . . . . .
      presence_sensitivity: high
      presence:
        name: "Sofa Zone Presence"
      motion:
        name: "Sofa Zone Motion"

  radar_software_version:
    name: "Radar Software Version"
  radar_temperature:
    name: "Radar Temperature"
  radar_debug:
    name: "Radar Debug"
  realtime_people_number:
    name: "Realtime People Number"
  ontime_people_number:
    name: "Ontime People Number"
  realtime_people_counting:
    name: "Realtime People Counting"
  walking_distance:
    name: "Walking Distance"
  sleep_presence:
    name: "Sleep Presence"
  sleep_inout_state:
    name: "Sleep In/Out State"
  sleep_state:
    name: "Sleep State"
  sleep_event:
    name: "Sleep Event"
  target_posture:
    name: "Target Posture"

binary_sensor:
  # Button on the bottom of the device
  - platform: gpio
    pin:
      number: GPIO36
      inverted: true
    name: "Device Button"

# Status LED (README: IO27 - LED). Using one channel of RGB as status.
# Unused: IO26, IO14
light:
  - platform: status_led
    name: "Status LED"
    pin:
      number: GPIO27
      inverted: true
